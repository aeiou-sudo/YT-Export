name: YouTube Downloader Automation

# This allows you to run the action manually from the 'Actions' tab
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL to download'
        required: true
        default: ''

jobs:
  download_job:
    runs-on: ubuntu-latest
    # This pulls a pre-configured environment
    container:
      image: jrottenberg/ffmpeg:4.4-ubuntu 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        # Note: In a container, you might need to install python 
        # or use an image that has BOTH. 
        # For your resume, staying with 'ubuntu-latest' + Caching is actually faster.
        uses: actions/setup-python@v5
        with:
          python_version: '3.10'

      # NEW: Caching step to speed up Python libraries
      - name: Cache Pip Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Run Download Script
        run: |
          python downloader.py <<EOF
          ${{ github.event.inputs.video_url }}
          EOF