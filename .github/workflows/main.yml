name: YouTube Downloader Automation

# This allows you to run the action manually from the 'Actions' tab
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL to download'
        required: true
        default: ''

jobs:
  download_job:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python_version: '3.10'

      # 3. Install FFmpeg (Essential for high-quality merging)
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # 4. Install your project dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      # 5. Run the downloader script
      - name: Run Download Script
        run: |
          python downloader.py <<EOF
          ${{ github.event.inputs.video_url }}
          EOF

      # 6. Upload the video so you can download it from GitHub
      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: ./*.mkv  # Matches the MKV files created by the script
