name: YouTube Downloader Automation

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL to download'
        required: true

jobs:
  download_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Fixed: Use a dash, not an underscore
          python-version: '3.10'

      - name: Install FFmpeg & Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install yt-dlp nodejs-bin  # Added nodejs-bin here

      - name: Install Dependencies
        run: pip3 install yt-dlp

      - name: Install JS Runtime
        run: sudo apt-get install -y nodejs # This gives yt-dlp the 'engine' it needs

      - name: Create Cookies File
        # This takes your secret and writes it to a file the script can see
        run: echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Download Script
        # We add the PATH to Node.js so yt-dlp finds it immediately
        run: |
          python downloader.py <<EOF
          ${{ github.event.inputs.video_url }}
          EOF

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          # Fixed: This will now find .mkv, .mp4, or .webm files
          path: |
            ./*.mkv
            ./*.mp4
            ./*.webm
          if-no-files-found: error # This will make the job "Fail" if it can't find the video, which is better for debugging