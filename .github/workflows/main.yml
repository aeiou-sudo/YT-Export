name: YouTube Downloader Automation

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL (Standard, Short, or Playlist)'
        required: true

jobs:
  download_job:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Set up Node.js 20 (JS Runtime for Signatures)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 4. Install System Dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 5. Install Python Dependencies (yt-dlp)
        run: pip install yt-dlp

      - name: 6. Inject Authentication Cookies
        # Using GitHub Secrets to bypass bot-detection
        run: echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: 7. Execute Downloader Script
        run: |
          # Clean up the PATH
          export PATH=$PATH:$(which node)
          export YTDLP_NODE_PATH=$(which node)
          
          # Force python to use the standard node location
          python downloader.py <<EOF
          ${{ github.event.inputs.video_url }}
          EOF

      - name: 8. Upload Resulting Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: youtube-media-export
          path: |
            ./*.mkv
            ./*.mp4
            ./*.webm
          if-no-files-found: error