name: YouTube Downloader Automation

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL (Standard, Short, or Playlist)'
        required: true

jobs:
  download_job:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Set up Node.js 20 (JS Runtime for Signatures)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 4. Install System Dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 5. Install Python Dependencies (yt-dlp)
        run: pip install yt-dlp

      - name: 6. Inject Authentication Cookies
        # Using GitHub Secrets to bypass bot-detection
        run: echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: 7. Execute Downloader Script
        run: |
          # 1. Clear any existing broken links
          sudo rm -f /usr/local/bin/node
          
          # 2. Create a clean symlink from the actual hosted tool cache
          # This ensures yt-dlp sees a "Standard" executable
          sudo ln -s $(which node) /usr/local/bin/node
          
          # 3. Export the path explicitly so the Python sub-process inherits it
          export YTDLP_NODE_PATH=/usr/local/bin/node
          
          # 4. Check if it's working (this will show in your logs)
          /usr/local/bin/node -v
          
          python downloader.py <<EOF
          ${{ github.event.inputs.video_url }}
          EOF

      - name: 8. Upload Resulting Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: youtube-media-export
          path: |
            ./*.mkv
            ./*.mp4
            ./*.webm
          if-no-files-found: error